<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="icon" href="./hack.png"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="theme-color" content="#000000"/><meta name="description" content="Web site created using create-react-app"/><link rel="apple-touch-icon" href="./hack.png"/><link rel="manifest" href="./manifest.json"/><title>The Nightfall Incident</title><link href="./static/css/bundle.css" rel="stylesheet"></head><body><noscript>You need to enable JavaScript to run this app.</noscript><div id="root"></div><script>
(function(){
  var _contexts=[];
  var _patch=function(ctor){
    if(!ctor)return ctor;
    return function(){
      var ctx=new (Function.prototype.bind.apply(ctor,[null].concat(Array.from(arguments))))();
      _contexts.push(ctx);
      return ctx;
    };
  };
  window.AudioContext=_patch(window.AudioContext);
  window.webkitAudioContext=_patch(window.webkitAudioContext);
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='visible'){
      _contexts.forEach(function(ctx){if(ctx.state==='suspended')ctx.resume();});
    }
  });
})();
</script><script src="./static/js/bundle.js"></script></body></html>
